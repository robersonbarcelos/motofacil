  <!-- Critical CSS inline -->
  <style>
    :root{--bg:#0A0A0A;--surface:#141414;--surface2:#1E1E1E;--line:#2a2620;--fg:#FFFFFF;--muted:#9E9E9E;--accent:#C9A84C;--accent2:#C0392B;--wa:#25D366;--radius:12px;--font-display:"Barlow Condensed",ui-sans-serif,system-ui,sans-serif;--font-body:"Manrope",ui-sans-serif,system-ui,-apple-system,sans-serif;--max:1280px;--pad:clamp(16px,4vw,56px);--pad-y:clamp(72px,10vw,130px)}
    *{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth;overflow-x:hidden;max-width:100%}
    body{padding-top:72px;background:var(--bg);color:var(--fg);font-family:var(--font-body);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:hidden}
    a{color:inherit;text-decoration:none}
    img,svg{display:block;max-width:100%}
    #root{min-height:100vh}
    [data-reveal]{transition-property:opacity,transform;transition-duration:1.1s;transition-timing-function:cubic-bezier(0.16,1,0.3,1);transition-delay:var(--d,0ms)}
    html.reveal-armed [data-reveal]:not([data-revealed]){opacity:0;transform:translateX(var(--rx,0px)) translateY(var(--ry,64px)) scale(var(--rs,0.94))}
    html.reveal-armed [data-reveal][data-revealed]{opacity:1!important;transform:translateX(0) translateY(0) scale(1)!important}
    .hero{position:relative;padding:clamp(48px,8vw,96px) var(--pad) var(--pad-y)}
    .hero__logo{height:240px;width:auto;margin-bottom:24px}
    .nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(10,9,7,0.55);backdrop-filter:blur(20px) saturate(180%);border-bottom:1px solid rgba(255,255,255,0.05);transition:background .35s ease,padding .3s ease;padding:14px 0}
    .topbar{background:var(--accent);border-top:none}
  </style>

  <link rel="stylesheet" href="styles.css" />

  <script>
    (function(){var arm=function(){document.documentElement.classList.add('reveal-armed');};if(document.visibilityState==='visible'){arm();}else{document.addEventListener('visibilitychange',function(){if(document.visibilityState==='visible')arm();},{once:true});}})();
  </script>
</head>
